# Deploys the OwnerPay dashboard to GitHub Pages (the "host: both" option).
# `configure-pages` with enablement:true turns Pages on automatically the first time,
# so no manual Settings step is needed.
#
# Reminder: anyone who opens the Pages URL only sees an empty dashboard — your signing
# key lives passphrase-encrypted in *your* browser's localStorage, never in the build.
name: Deploy dashboard to Pages

on:
  push:
    branches: [main]
    paths: ['dashboard/**', '.github/workflows/deploy-dashboard.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & build
        working-directory: dashboard
        run: |
          npm install
          npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
